[settings]
activate_aggressive = true
ruby.compile = false
# python はプリコンパイル版のみ使う。CPython リリース直後はプリコンパイル版が
# 未公開のことがあり、ソースビルドへのフォールバックは macOS (Nix 環境) で
# 失敗する。false にするとバンプ対象もプリコンパイル版の一覧に限定される。
python.compile = false
# rust は手動 rustup で管理する。mise が rust-toolchain.toml を自動検出して
# 既定 toolchain (stable) の bin を PATH に注入し、rustup proxy をバイパスする
# 不具合があるため、rust プラグイン自体を無効化する
disable_tools = ["rust"]

[settings.github]
github_attestations = false
# gh は token を keychain に保存するため、mise には明示的に取得方法を教える。
credential_command = "gh auth token"

[tools]
java = "temurin-26.0.1"
node = "26"
python = "3.14.6"
ruby = "4.0"
claude = "2.1.215"
codex = "0.144.6"
"npm:takt" = "0.51.0"
"npm:takt-sdd" = "2.3.0"
"npm:takt-marp" = "0.5.0"
"npm:happy-coder" = "1.1.9"
"npm:npm-check-updates" = "22.2.9"
"npm:@github/copilot" = "1.0.71"
