[settings]
github.github_attestations = false
ruby.compile = false
# rust は手動 rustup で管理する。mise が rust-toolchain.toml を自動検出して
# 既定 toolchain (stable) の bin を PATH に注入し、rustup proxy をバイパスする
# 不具合があるため、rust プラグイン自体を無効化する
disable_tools = ["rust"]

[tools]
java = "temurin-26.0.1"
node = "26"
python = "3.14.5"
ruby = "4.0"
claude = "2.1.144"
codex = "0.131.0"
"npm:takt" = "0.41.0"
"npm:happy-coder" = "1.1.9"
"npm:npm-check-updates" = "22.2.0"
"npm:@github/copilot" = "1.0.49"
